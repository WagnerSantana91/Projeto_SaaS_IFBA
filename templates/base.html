{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>{% block title %}Motel SaaS{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<div class="wrapper">

    <!-- SIDEBAR -->
    <nav id="sidebar">

        <div class="sidebar-header">
            <h4>Motel SaaS</h4>
        </div>

        <ul class="list-unstyled components">

            <li>
                <a href="{% url 'dashboard' %}">Dashboard</a>
            </li>

            <li>
                <a href="{% url 'quartos:listar_quartos' %}">Quartos</a>
            </li>

            <li>
                <a href="#">Reservas</a>
            </li>

            <li>
                <a href="{% url 'clientes:listar_clientes' %}">Clientes</a>
            </li>

            <li>
                <a href="#">Financeiro</a>
            </li>

            <li>
                <a href="{% url 'empresas:listar_empresas' %}">Empresa</a>
            </li>

            <li>
                <a href="{% url 'funcionarios:listar_funcionarios' %}">Funcionários</a>
            </li>

        </ul>

    </nav>


    <!-- PAGE CONTENT -->
    <div id="content">

        <!-- NAVBAR -->
        <nav class="navbar navbar-light bg-white shadow-sm">

            <button type="button" id="sidebarCollapse" class="btn btn-primary">
                ☰
            </button>

            <span class="ms-3 fw-bold">Painel Administrativo</span>

            <div class="ms-auto me-3">
                <button class="btn btn-outline-danger btn-sm">Sair</button>
            </div>

        </nav>


        <div class="container-fluid p-4">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</div>


<script src="https://unpkg.com/imask"></script>
<script src="{% static 'js/scripts.js' %}"></script>

</body>
</html>
